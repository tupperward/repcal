apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cronjob-creator
rules:
- apiGroups: ["batch"]
  resources: ["cronjobs"]
  verbs: ["create", "get", "list", "delete"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cronjob-creator-binding
subjects:
- kind: ServiceAccount
  name: sansculottides
  namespace: repcal
roleRef:
  kind: ClusterRole
  name: cronjob-creator
  apiGroup: rbac.authorization.k8s.io

---

apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: configmap-writer
  namespace: repcal
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["create", "get", "patch", "update"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: configmap-writer-binding
  namespace: repcal
subjects:
- kind: ServiceAccount
  name: sansculottides
  namespace: repcal
roleRef:
  kind: Role
  name: configmap-writer
  apiGroup: rbac.authorization.k8s.io
