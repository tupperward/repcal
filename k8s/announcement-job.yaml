apiVersion: v1
kind: ConfigMap
metadata:
  name: announcement-text
  namespace: repcal
data:
  announcement.txt: |
    Mes chers sans-culottes,

    My most sincere apologies for the spamming. Sometimes automation is hard.

    Liberté, égalité, fraternité!
---
apiVersion: batch/v1
kind: Job
metadata:
  name: announcement
  namespace: repcal
spec:
  suspend: true
  backoffLimit: 0
  template:
    spec:
      serviceAccountName: sansculottides
      automountServiceAccountToken: true
      containers:
      - name: announcement
        image: tupperward/repcal:announcement
        imagePullPolicy: Always
        command: ["python", "announcement.py"]
        env:
        - name: ANNOUNCEMENT_FILE
          value: /data/announcement.txt
        - name: ANNOUNCEMENT_IMAGE_URL
          value: 'https://frenchrepublican.info/static/images/revolution.jpg'
        - name: DB_PATH
          value: /data/calendar.db
        volumeMounts:
        - name: announcement-text
          mountPath: /data/announcement.txt
          subPath: announcement.txt
        - name: repcal-db
          mountPath: /data/calendar.db
          subPath: calendar.db
      volumes:
      - name: announcement-text
        configMap:
          name: announcement-text
      - name: repcal-db
        persistentVolumeClaim:
          claimName: repcal-db
      restartPolicy: Never
