apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: sansculottides
  name: sansculottides
  namespace: repcal
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: sansculottides
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: sansculottides
    spec:
      serviceAccountName: sansculottides
      initContainers:
      - name: seed-db
        image: tupperward/repcal:v3
        command: ['sh', '-c', 'test -f /data/calendar.db || cp /repcal/calendar.db /data/calendar.db; chown -R daemon:daemon /data']
        securityContext:
          runAsUser: 0
        volumeMounts:
        - name: repcal-db
          mountPath: /data
      containers:
      - image: tupperward/repcal:v3
        imagePullPolicy: Always
        name: sansculottides
        env:
        - name: DB_PATH
          value: /data/calendar.db
        ports:
        - containerPort: 80
          protocol: TCP
        resources: {}
        volumeMounts:
        - name: repcal-db
          mountPath: /data
      volumes:
      - name: repcal-db
        persistentVolumeClaim:
          claimName: repcal-db
