[pytest]
# Pytest configuration for repcal project

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Coverage options (if using pytest-cov)
# --cov=repcal_shared
# --cov=web
# --cov=bot
# --cov=webhook
# --cov-report=html
# --cov-report=term-missing

# Markers for organizing tests
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow-running tests
    web: Web application tests
    bot: Bluesky bot tests
    webhook: Discord webhook tests
    shared: Shared package tests

# Ignore paths
norecursedirs = .git .venv venv __pycache__ .pytest_cache .claude k8s
